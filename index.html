<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="icon" type="image/png" href="/favicon-96x96.png?v=20260624" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260624" />
    <link rel="shortcut icon" href="/favicon.ico?v=20260624" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=20260624" />
    <meta name="apple-mobile-web-app-title" content="Jason Omemu's Site" />
    <link rel="manifest" href="/site.webmanifest?v=20260624" />
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <meta name="theme-color" content="#F5F4EF" />
    <meta
      name="description"
      content="Senior full-stack software engineer building accessible, well-architected products end to end."
    />
    <title>Personal Site for Jason Omemu | Senior Software Engineer</title>
    <script>
      (function () {
        var theme = localStorage.getItem('theme');

        if (theme === 'dark' || theme === 'light') {
          document.documentElement.setAttribute('data-theme', theme);
        }

        var osDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var themeColor = document.querySelector('meta[name="theme-color"]');
        if (themeColor) {
          themeColor.setAttribute('content', osDark ? '#0B1A1B' : '#F5F4EF');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
